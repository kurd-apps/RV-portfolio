<!DOCTYPE html>
<html lang="en" dir="ltr" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Vazirmatn', sans-serif; background-color: #f8fafc; color: #0f172a; }
        .project-card:hover img { transform: scale(1.05); }
        .project-card img { transition: transform 0.5s ease; }
    </style>
</head>
<body class="transition-all duration-300 antialiased relative">

    <header class="fixed w-full top-0 bg-white/80 backdrop-blur-md z-40 border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex justify-between items-center">
            <div id="logoName" class="font-black text-2xl tracking-tight">LOGO.</div>
            <button id="langToggle" class="text-sm font-bold bg-gray-900 text-white px-4 py-2 rounded-full hover:bg-gray-700 transition">کوردی</button>
        </div>
    </header>

    <section class="pt-40 pb-20 px-6 max-w-7xl mx-auto text-center">
        <h1 id="heroName" class="text-5xl md:text-7xl font-black mb-6 text-gray-900 tracking-tight">...</h1>
        <h2 id="heroTitle" class="text-2xl md:text-3xl font-bold text-indigo-600 mb-6">...</h2>
        <p id="heroSub" class="text-lg md:text-xl text-gray-500 max-w-2xl mx-auto">...</p>
    </section>

    <section class="py-20 bg-white px-6">
        <div class="max-w-7xl mx-auto grid grid-cols-1 md:grid-cols-2 gap-16">
            <div>
                <h3 id="aboutTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6 border-b pb-4">About Me</h3>
                <p id="aboutDesc" class="text-lg text-gray-700 leading-relaxed text-justify">...</p>
            </div>
            <div>
                <h3 id="skillsTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-6 border-b pb-4">Skills</h3>
                <div id="skillsList" class="space-y-6">
                    </div>
            </div>
        </div>
    </section>

    <section class="py-20 px-6 max-w-7xl mx-auto">
        <h3 id="projectsTitle" class="text-sm font-bold uppercase tracking-widest text-gray-400 mb-10 border-b pb-4 text-center">Selected Works</h3>
        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
            </div>
    </section>

    <div id="projectModal" class="fixed inset-0 z-50 bg-white overflow-y-auto hidden opacity-0 transition-opacity duration-300">
        <button onclick="closeProject()" class="fixed top-6 right-6 z-50 bg-gray-900 text-white w-12 h-12 rounded-full font-bold text-xl flex items-center justify-center hover:scale-110 transition shadow-lg">✕</button>
        <div class="max-w-5xl mx-auto py-20 px-6" id="modalContent">
            </div>
    </div>

    <script>
        // زۆر گرنگ: لێرەدا لینکی Raw ی گیتهەبەکەت دابنێ
        const JSON_URL = 'https://raw.githubusercontent.com/YOUR_USERNAME/YOUR_REPO/main/data.json';
        
        let currentLang = 'en';
        let siteData = null;

        async function loadData() {
            try {
                const res = await fetch(JSON_URL + '?t=' + Date.now());
                siteData = await res.json();
                renderUI();
            } catch (error) { console.error("Error loading data:", error); }
        }

        function renderUI() {
            if (!siteData) return;
            const isKu = currentLang === 'ku';
            document.documentElement.lang = isKu ? 'ku' : 'en';
            document.documentElement.dir = isKu ? 'rtl' : 'ltr';
            document.getElementById('langToggle').innerText = isKu ? 'English' : 'کوردی';

            // Sections
            const sec = siteData.sections;
            document.getElementById('logoName').innerText = sec.hero.name[currentLang];
            document.getElementById('heroName').innerText = sec.hero.name[currentLang];
            document.getElementById('heroTitle').innerText = sec.hero.title[currentLang];
            document.getElementById('heroSub').innerText = sec.hero.subtitle[currentLang];
            
            document.getElementById('aboutTitle').innerText = sec.about.heading[currentLang];
            document.getElementById('aboutDesc').innerText = sec.about.desc[currentLang];
            
            document.getElementById('skillsTitle').innerText = sec.skills.heading[currentLang];
            document.getElementById('projectsTitle').innerText = isKu ? 'کارەکانم' : 'Selected Works';

            // Skills
            document.getElementById('skillsList').innerHTML = sec.skills.list.map(skill => `
                <div>
                    <div class="flex justify-between mb-1 font-bold text-sm">
                        <span>${skill.name[currentLang]}</span><span>${skill.percent}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-indigo-600 h-2 rounded-full" style="width: ${skill.percent}%"></div></div>
                </div>
            `).join('');

            // Projects Cards
            document.getElementById('projectsGrid').innerHTML = siteData.projects.map((p, index) => `
                <div onclick="openProject(${index})" class="project-card group cursor-pointer bg-white rounded-2xl shadow-sm hover:shadow-xl transition-all duration-300 border border-gray-100 overflow-hidden flex flex-col h-full">
                    <div class="w-full h-64 overflow-hidden bg-gray-100">
                        <img src="${p.images[0] || ''}" class="w-full h-full object-cover">
                    </div>
                    <div class="p-6 flex-grow flex flex-col">
                        <p class="text-indigo-600 text-xs font-bold mb-2 uppercase tracking-wide">${p.category[currentLang]}</p>
                        <h3 class="text-xl font-bold mb-3 text-gray-900">${p.title[currentLang]}</h3>
                        <p class="text-gray-500 text-sm flex-grow">${p.shortDesc[currentLang]}</p>
                    </div>
                </div>
            `).join('');
        }

        function openProject(index) {
            const p = siteData.projects[index];
            const isKu = currentLang === 'ku';
            const modal = document.getElementById('projectModal');
            const content = document.getElementById('modalContent');
            
            // دروستکردنی پەڕەی پڕۆژەکە
            let html = `
                <h4 class="text-indigo-600 font-bold mb-4 uppercase tracking-wider">${p.category[currentLang]}</h4>
                <h2 class="text-4xl md:text-5xl font-black mb-8 text-gray-900">${p.title[currentLang]}</h2>
            `;

            // ڤیدیۆ (ئەگەر هەبوو)
            if(p.videoLink) {
                // دڵنیابوون لەوەی لینکی یوتیوب شێوەی embed ی هەیە
                let vLink = p.videoLink;
                if(vLink.includes('watch?v=')) vLink = vLink.replace('watch?v=', 'embed/');
                html += `<div class="w-full aspect-video rounded-2xl overflow-hidden shadow-2xl mb-12 bg-black">
                            <iframe src="${vLink}" class="w-full h-full border-0" allowfullscreen></iframe>
                         </div>`;
            }

            // تێکستی درێژ
            html += `<p class="text-lg md:text-xl text-gray-700 leading-relaxed mb-12 text-justify">${p.fullDesc[currentLang]}</p>`;

            // وێنەکانی تر
            if(p.images && p.images.length > 0) {
                html += `<div class="grid grid-cols-1 md:grid-cols-2 gap-6">`;
                p.images.forEach(img => {
                    html += `<img src="${img}" class="w-full rounded-2xl shadow-md">`;
                });
                html += `</div>`;
            }

            content.innerHTML = html;
            modal.classList.remove('hidden');
            setTimeout(() => modal.classList.remove('opacity-0'), 10);
            document.body.style.overflow = 'hidden'; // ڕێگریکردن لە سکڕۆڵی سایتی سەرەکی
        }

        function closeProject() {
            const modal = document.getElementById('projectModal');
            modal.classList.add('opacity-0');
            setTimeout(() => {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            }, 300);
        }

        document.getElementById('langToggle').addEventListener('click', () => {
            currentLang = currentLang === 'en' ? 'ku' : 'en';
            renderUI();
        });

        loadData();
    </script>
</body>
</html>
